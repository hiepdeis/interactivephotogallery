<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vietnam Scenic Photo Gallery</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js"></script>

</head>

<body>

    <h1>Vietnam Scenic Photo Gallery</h1>

    <div id="image">

        Hover over an image below to display here.

    </div>

    <div class="gallery">

        <img src="https://upload.wikimedia.org/wikipedia/commons/7/79/Ha_Long_Bay_in_2019.jpg"
            alt="Ha Long Bay with limestone islands"
            onmouseover="upDate(this)"
            onmouseout="undo()">

        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Ray_over_terrace_rice_field_in_Sapa_-_Trung_Ch%E1%BA%A3i..jpg"
            alt="Terraced rice fields in Sapa"
            onmouseover="upDate(this)"
            onmouseout="undo()">

        <img src="https://upload.wikimedia.org/wikipedia/commons/a/ab/Phong_nha_cave.jpg"
            alt="Phong Nha Cave entrance"
            onmouseover="upDate(this)"
            onmouseout="undo()">

        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Golden_Bridge_at_Ba_Na_Hills_20250718.jpg"
            alt="Golden Bridge in Da Nang"
            onmouseover="upDate(this)"
            onmouseout="undo()">

        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Xuan_Huong_Lake_08.jpg"
            alt="Xuan Huong Lake in Da Lat"
            onmouseover="upDate(this)"
            onmouseout="undo()">

        <img src="https://upload.wikimedia.org/wikipedia/commons/0/0d/Beautiful_beach_on_Phu_Quoc_island_Vietnam_%2839543775721%29.jpg"
            alt="Beach in Phu Quoc"
            onmouseover="upDate(this)"
            onmouseout="undo()">

    </div>

</body>

</html>
